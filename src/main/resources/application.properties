spring.application.name=movietracker
spring.datasource.url=${db-url:jdbc:h2:file:~/movietrackerdb}
spring.datasource.username=${db-username:}
spring.datasource.password=${db-password:}
spring.datasource.driverClassName=${db-driver:org.h2.Driver}
spring.jpa.hibernate.ddl-auto=update
spring.web.resources.chain.enabled=true

# OAuth2 Client Configuration for GitHub
spring.security.oauth2.client.registration.github.clientId=${github-client-id}
spring.security.oauth2.client.registration.github.clientSecret=${github-client-secret}
spring.security.oauth2.client.registration.github.scope=read:user,user:email