<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet" />
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h1>Delete Movie</h1>
    <form th:action="@{|/delete/${movie.id}|}" th:object="${movie}" method="post">
        <label>Name:</label>
        <label th:text="*{name}"></label>
        <br>
        <label>Date watched:</label>
        <label th:text="${#dates.format(movie.dateWatched, 'yyyy-MM-dd')}"></label>
        <br/>
        <br/>
        <a th:href="@{/}" class="btn btn-primary">Back to List</a>
        <button type="submit" class="btn btn-danger">Delete</button>
    </form>
</div>
</body>
</html>
