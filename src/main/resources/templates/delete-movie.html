<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <link th:href="@{/movietracker.css}" rel="stylesheet" />
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h2>Delete Movie</h2>
    <form th:action="@{|/delete/${movie.id}|}" th:object="${movie}" method="post">
        <table class="table">
            <tr>
                <td>Name</td>
                <td th:text="*{name}"></td>
            </tr>
            <tr>
                <td>Streaming</td>
                <td th:text="*{streamingService}"></td>
            </tr>
            <tr>
                <td>Date watched</td>
                <td th:text="${#temporals.format(movie.dateWatched, 'yyyy-MM-dd')}"></td>
            </tr>
        </table>

        <div class="d-flex align-items-center">
            <a th:if="${returnUrl}" th:href="${returnUrl}" class="button btn btn-primary">Back to List</a>
            <button type="submit" class="button btn btn-danger ms-auto">Delete</button>
        </div>
    </form>
</div>
</body>
</html>
