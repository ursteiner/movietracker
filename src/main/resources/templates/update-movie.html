<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet" />
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
    <link th:href="@{/movietracker.css}" rel="stylesheet" />
</head>
<body>
    <div th:replace="~{fragments/header}"></div>

    <div class="container">
        <h2>Update Movie</h2>
        <form th:action="@{|/update/${movie.id}|}" th:object="${movie}" method="post">
            <div th:replace="~{fragments/movie-fields}"></div>
            <div class="d-flex align-items-center">
                <a th:if="${returnUrl}" th:href="${returnUrl}" class="button btn btn-primary">Back to List</a>
                <button type="submit" class="button btn btn-success ms-auto">Update</button>
            </div>
        </form>
    </div>
</body>
</html>
