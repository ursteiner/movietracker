<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/bootstrap-icons/font/bootstrap-icons.css}" rel="stylesheet">
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h2>Movie Watchlist <span class="badge text-bg-secondary opacity-50" th:text="${totalWatchlist}"></span></h2>
    <div th:replace="~{fragments/movie-table :: movie-table(${watchlistMovies}, false, @{/watchlist(page=${page},sortBy=${sortBy},sortOrder=${sortOrder})}, '/watchlist')}">
    </div>

    <div th:replace="~{fragments/pagination :: pagination('/watchlist')}"></div>
</div>
</body>
</html>
