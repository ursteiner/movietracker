<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h2>Movie List <span class="badge text-bg-secondary opacity-50" th:text="(${movies} == null ? 0 : ${movies.size()})"></span></h2>
    <div th:replace="fragments/movie-table :: movie-table(${movies}, true, false, '/')">
    </div>
</div>
</body>
</html>
