<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
    <style>
        .navigate {
            width: 100px;
        }
    </style>
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h2>Movie List <span class="badge text-bg-secondary opacity-50" th:text="${totalMovies}"></span></h2>
    <div th:replace="~{fragments/movie-table :: movie-table(${movies}, true, '/')}"></div>

    <div class="d-flex justify-content-center">
        <div>
            <a th:href="@{/(page=${page - 1},size=${size},sortBy=${sortBy},sortOrder=${sortOrder})}"
               class="btn btn-primary navigate" th:classappend="${page == 1} ? ' disabled' : ''">Previous</a>
            <span class="badge text-bg-secondary opacity-50" th:text="${page}"></span>
            <span class="badge text-bg-secondary opacity-50" th:text="${totalPages}"></span>
            <a th:href="@{/(page=${page + 1},size=${size},sortBy=${sortBy},sortOrder=${sortOrder})}"
               class="btn btn-primary navigate" th:classappend="${page >= totalPages} ? ' disabled' : ''">Next</a>
        </div>
    </div>
</div>
</body>
</html>
