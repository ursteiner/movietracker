<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
    <h2>User Info</h2>
    <form th:action="@{|/delete/}" method="post">
        <table class="table">
            <tr>
                <td>Name</td>
                <td th:text="${#authentication.principal.getAttribute('login')}"></td>
            </tr>
        </table>

        <div class="d-flex align-items-center">
            <button type="submit" class="button btn btn-danger ms-auto">Delete account</button>
        </div>
    </form>
</div>
</body>
</html>
