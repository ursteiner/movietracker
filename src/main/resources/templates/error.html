<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/css/bootstrap.min.css}" rel="stylesheet"/>
    <script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
</head>
<body>
<div th:replace="~{fragments/header}"></div>
<div class="container">
<div class="card">
    <div class="card-body">
        <h5 class="card-title">Oops! Something went wrong.</h5>
        <p class="card-text" th:text="'Status: ' + ${status}"></p>
    </div>
    <ul class="list-group list-group-flush">
        <li class="list-group-item" th:text="'Error: ' + ${error}"></li>
        <li class="list-group-item" th:text="'Path: ' + ${path}"></li>
    </ul>
</div>
</div>
</body>
</html>
