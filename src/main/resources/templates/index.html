<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <title>🎬 MovieTracker</title>
    <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
    <link th:href="@{/webjars/bootstrap-icons/1.13.1/font/bootstrap-icons.css}" rel="stylesheet">
    <style>
        .center-below-header {
            min-height: calc(100vh - 56px);
        }
    </style>

</head>
<body>
<div th:replace="~{fragments/header}"></div>
<div class="d-flex justify-content-center align-items-center center-below-header">
    <div th:if="${#authentication.authenticated and #authentication.name != 'anonymousUser'}">
        Logged in as <span th:text="${#authentication.principal.getAttribute('login')}"></span>
    </div>
    <div th:unless="${#authentication.authenticated and #authentication.name != 'anonymousUser'}">
        <a class="btn btn-primary bi bi-github" href="/oauth2/authorization/github"> Login with GitHub</a>
    </div>
</div>

</body>
</html>
