<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en" data-bs-theme="dark">
<head>
  <meta charset="UTF-8">
  <title>🎬 MovieTracker</title>
  <link th:href="@{/webjars/bootstrap/5.3.8/css/bootstrap.min.css}" rel="stylesheet"/>
</head>
<body>
<div th:replace="~{fragments/header}"></div>

<div class="container">
  <h2>Statistic</h2>
  <table class="table">
    <tr>
      <th>Year-Month</th>
      <th>Movies</th>
    </tr>
    <tr th:each="statistic : ${moviesPerMonth}">
      <td th:text="${statistic[0]}"></td>
      <td th:text="${statistic[1]}"></td>
    </tr>
  </table>
</div>
</body>
</html>
